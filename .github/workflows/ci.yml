name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Node 20 runs the full suite and the pinned Codex CLI on both platforms.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check jq is present
        run: jq --version

      # Enforce the bash-3.2 portability invariant (see dm:knowledge) before
      # anything else runs: a bash-4-only construct in bin/*.sh would only
      # blow up at runtime on a macOS 3.2 shell, so catch it here for both
      # runner images. The comment-stripping grep excludes lines that are
      # pure comments (e.g. a note explaining why a construct is avoided)
      # so it doesn't flag itself.
      - name: Check for banned bash-4 constructs in bin/*.sh
        run: |
          if grep -REn 'mapfile|readarray|declare -A|\$\{[A-Za-z_][A-Za-z0-9_]*(\^\^|,,)|&>>' bin/*.sh \
              | grep -vE ':[0-9]+:[[:space:]]*#'; then
            echo "banned bash-4 construct found in bin/*.sh (see above)"
            exit 1
          fi

      # Guard against the macOS runner image quietly switching its default
      # /bin/bash to a non-3.2 version, which would make the "system bash"
      # smoke run below stop actually testing the 3.2 portability invariant.
      - name: Assert macOS system bash is v3
        if: matrix.os == 'macos-latest'
        run: |
          # Only the first line is the actual version banner; --version's
          # later lines (the GPL license notice) say "GNU GPL version 3"
          # on every bash >= 4 too, which would false-match the whole blob.
          ver="$(/bin/bash --version 2>&1)"
          first_line="${ver%%$'\n'*}"
          echo "$first_line"
          case "$first_line" in
            *"version 3"*) ;;
            *) echo "macOS system /bin/bash is no longer version 3; the bash-3.2 leg is no longer testing what it claims"; exit 1 ;;
          esac

      # macOS runners default /bin/bash to the system bash (3.2), which is the
      # exact shell the toolbelt's bash-3.2 portability invariant targets.
      # Invoke it explicitly so a PATH-shadowing bash (e.g. a Homebrew bash 5)
      # can never mask a 3.2 regression.
      - name: Run smoke tests (system bash)
        run: /bin/bash tests/smoke.sh

      - name: Install pinned Codex CLI
        run: npm install --global @openai/codex@0.144.6

      - name: Check workflows/pr-pipeline.js syntax
        run: node --check workflows/pr-pipeline.js

      - name: Check pr-pipeline gate lists match config
        run: node tests/check-gate-drift.js

      - name: Check compatible-host runner gates
        run: node tests/check-pr-runner.js

      - name: Check deterministic waiter child (mailbox wake remains manual)
        run: test "$(bash tests/runtime-waiter-child.sh 0)" = "WAITER_COMPLETION_OK"

      - name: Check Codex strict config/discovery/policy offline
        run: bash tests/runtime-codex-offline.sh

      - name: Check Claude/Codex runtime parity
        run: node tests/check-runtime-parity.js

      - name: Check runtime context-performance guardrails
        run: /bin/bash tests/runtime-performance.sh

      - name: Check bin/*.sh syntax
        run: |
          for f in bin/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done

      - name: Check runtime test syntax
        run: |
          bash -n tests/runtime-codex-offline.sh tests/runtime-evidence-dir.sh tests/runtime-performance.sh tests/runtime-smoke.sh tests/runtime-waiter-child.sh
          node --check tests/check-codex-skill-discovery.js
          node --check tests/check-runtime-parity.js
          node --check tests/check-pr-runner.js
          node --check tests/runtime-performance.js

  node14-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '14'
      - name: Check documented minimum Node syntax and tests
        run: |
          node --check workflows/pr-pipeline.js
          node tests/check-gate-drift.js
          node tests/check-pr-runner.js
          node tests/check-runtime-parity.js
          node tests/runtime-performance.js >/dev/null
